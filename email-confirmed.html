<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi Berhasil — FinanceApp</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #0f3d2e 0%, #1a5c45 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 48px 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .check {
    width: 72px;
    height: 72px;
    background: #e6f4ea;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }
  .check svg { width: 36px; height: 36px; }
  h1 {
    font-size: 22px;
    color: #14532d;
    margin-bottom: 12px;
    font-weight: 700;
  }
  p {
    font-size: 15px;
    color: #555;
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .brand {
    font-weight: 700;
    color: #1a5c45;
  }
  .note {
    font-size: 13px;
    color: #999;
    padding-top: 20px;
    border-top: 1px solid #eee;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="11" stroke="#1a5c45" stroke-width="1.5"/>
        <path d="M7 12.5L10.5 16L17 9" stroke="#1a5c45" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Verifikasi Berhasil</h1>
    <p>
      Email kamu sudah terkonfirmasi. Silakan tutup halaman ini dan
      buka kembali aplikasi <span class="brand">FinanceApp</span>
      untuk login dan mulai kelola keuanganmu.
    </p>
    <div class="note">
      Butuh bantuan? financeappsupport@gmail.com
    </div>
  </div>
</body>
</html>
